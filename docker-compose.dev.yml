#version: '3.8'

services:
  mysql:
    image: mysql:8.0
    #command: --default-authentification-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: marvin
    ports:
      - "3306:3306"
    volumes:
      - type: volume
        source: dbtest
        target: /var/lib/mysql
  php:
    # networks_mode: 'host'
    build: 
      context: .
      dockerfile: Dockerfile.php
    ports:
      - "8000:8000"
    volumes:
      - type: volume
        source: tls
        target: /root/.symfony5/certs
      - type: bind
        source: .
        target: /app
      - type: volume 
        target: /app/vendor
  
  node:
    network_mode: "host"
    build: 
      context: .
      dockerfile: Dockerfile.encore.dev
    volumes:
      - type: volume
        source: tls 
        target: /root/.symfony/certs
      - type: volume
        target: /app/node_modules
      - type: bind
        source: .
        target: /app
        
    # ports:
    #   - "8000:8000"




volumes:
  dbtest:
  tls: