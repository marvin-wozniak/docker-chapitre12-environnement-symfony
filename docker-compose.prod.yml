#version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    # volumes:
    #   - type: bind
    #     source:
    ports:
      - "80:80"
      - "443:443"

  mysql:
    image: mysql:8.3
    #command: --default-authentification-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: marvin
    ports:
      - "3306:3306"
    volumes:
      - type: volume
        source: dbprod
        target: /var/lib/mysql
  fpm:
    build: 
      context: .
      dockerfile: Dockerfile.fpm
    volumes:
      - type: volume 
        target: /app/vendor
      - type: bind
        source: .
        target: /app
  
  node:
    build: 
      context: .
      dockerfile: Dockerfile.encore.prod
    volumes:
      - type: volume
        target: /app/node_modules
      - type: bind
        source: .
        target: /app
        
    # ports:
    #   - "8000:8000"




volumes:
  dbprod:
